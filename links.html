        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #8b5cf6;
            --purple-dark: #7c3aed;
            --pink: #ec4899;
            --orange: #f97316;
            --blue: #3b82f6;
            --green: #10b981;
            --text: #111111;
            --text-light: #555555;
            --text-lighter: #999999;
            --bg: #ffffff;
            --bg-alt: #fafafa;
            --border: #eeeeee;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #faf8ff 0%, #ffffff 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 56px 20px 40px;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 84px;
            height: 84px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 0.86rem;
            color: var(--text-light);
            margin-top: 4px;
            margin-bottom: 32px;
            text-align: center;
        }

        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }

        .link-icon {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-icon svg { width: 20px; height: 20px; stroke: white; }
        .link-icon.filled svg { fill: white; stroke: none; }

        .icon-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .icon-green { background: linear-gradient(135deg, #25d366, #1ebe59); }
        .icon-pink { background: linear-gradient(135deg, #ec4899, #db2777); }
        .icon-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        .icon-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        .link-btn[data-c="purple"]:hover { border-color: var(--purple); }
        .link-btn[data-c="green"]:hover { border-color: #25d366; }
        .link-btn[data-c="pink"]:hover { border-color: var(--pink); }
        .link-btn[data-c="orange"]:hover { border-color: var(--orange); }
        .link-btn[data-c="blue"]:hover { border-color: var(--blue); }

        .link-text { flex: 1; }
        .link-sub {
            display: block;
            font-weight: 400;
            font-size: 0.76rem;
            color: var(--text-lighter);
            margin-top: 1px;
        }

        footer {
            margin-top: 40px;
            font-size: 0.76rem;
            color: var(--text-lighter);
            text-align: center;
        }
    </style>
